services:
  - type: web
    name: sdd-group7-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: BACKEND_URL
        sync: false   # ใส่ค่าจริงใน Render Dashboard เช่น https://sdd-group7-backend.onrender.com
      - key: FRONTEND_URL
        sync: false   # ใส่ค่าจริงใน Render Dashboard เช่น https://xxx.vercel.app
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false   # วาง JSON ทั้งก้อนของ serviceAccountKey.json ใน Render Dashboard
