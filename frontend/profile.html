<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — โปรไฟล์ของฉัน</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* 🛠️ แก้ไข Layout ที่ทับซ้อนกับ style.css */
    body {
      display: block !important;
      padding: 0 !important;
      background-color: #4a4a4a !important;
    }

    .navbar {
      display: flex !important;
      position: sticky;
      top: 0;
      width: 100%;
      z-index: 1000;
    }

    #profile-content {
      display: flex !important;
      justify-content: center;
      padding-top: 50px;
      padding-bottom: 50px;
      width: 100%;
      max-width: 100% !important;
    }

    .profile-inner {
      max-width: 900px !important;
      width: 95%;
      margin: 0 auto;
    }

    .profile-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 3rem;
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
    }

    .profile-card {
      background-color: #1e1e1e !important;
      border: 1px solid #444 !important;
      border-radius: 20px !important;
      padding: 50px 60px !important;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .profile-field {
      display: flex !important;
      align-items: center !important;
      width: 100%;
      gap: 20px;
    }

    .profile-field-label {
      min-width: 130px !important;
      font-size: 1.1rem !important;
      color: #fff;
      margin: 0 !important;
    }

    .profile-field-wrap {
      flex: 1 !important;
      position: relative;
    }

    .profile-field-input {
      width: 100% !important;
      background: #2a2a2a !important;
      border: 1px solid #555 !important;
      border-radius: 50px !important;
      padding: 12px 25px !important;
      color: #fff !important;
      font-size: 1rem !important;
      outline: none;
    }

    .profile-field-input[readonly] {
      background: #111 !important;
      color: #888 !important;
      border-color: #333 !important;
    }

    .edit-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #f90;
      pointer-events: none;
    }

    .history-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 20px;
      margin-bottom: 15px;
      color: #fff;
    }

    .history-box {
      background-color: #000 !important;
      border: 1px solid #333 !important;
      border-radius: 15px !important;
      padding: 30px !important;
      min-height: 120px;
    }

    .history-empty {
      text-align: center;
      color: #666;
    }

    .action-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
    }

    .save-btn {
      background-color: #f90 !important;
      color: #000 !important;
      font-weight: 700;
      border: none;
      padding: 12px 40px !important;
      border-radius: 50px !important;
      cursor: pointer;
    }

    .logout-btn {
      background: transparent !important;
      border: 1px solid #c33 !important;
      color: #f88 !important;
      padding: 12px 40px !important;
      border-radius: 50px !important;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <nav class="navbar" id="navbar">
    <div class="navbar-brand" style="cursor:pointer;" onclick="window.location.href='index.html'">BARBERSHOP</div>
    <div class="navbar-links">
      <button class="nav-link" onclick="window.location.href='index.html#services'">บริการ</button>
      <button class="nav-link" onclick="window.location.href='index.html#experts'">ช่างของเรา</button>
      <button class="nav-link" onclick="window.location.href='booking.html'">จองคิว</button>
      <button class="nav-link" onclick="window.location.href='index.html#footer'">ติดต่อเรา</button>
      <div class="nav-spacer"></div>
      <button class="nav-profile active" onclick="window.location.href='profile.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
        </svg>
        Profile
      </button>
    </div>
  </nav>

  <div class="page active" id="profile-content">
    <div class="profile-inner">
      <div class="profile-title">Profile</div>

      <div class="profile-avatar-wrap" style="display: flex; justify-content: center; margin-bottom: 30px;">
        <label class="avatar-upload-wrap" for="avatar-file-input" style="position: relative; cursor: pointer; display: block; width: 140px; height: 140px; border-radius: 50%; border: 4px solid #333; overflow: hidden;">
          <div class="profile-avatar" style="width: 100%; height: 100%; background: #555; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;">
            <svg id="avatar-default-icon" width="60" height="60" viewBox="0 0 24 24" fill="white">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
            </svg>
            <img id="avatar-img" src="" style="display:none; width:100%; height:100%; object-fit:cover;" />
          </div>
          
          <div class="avatar-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; opacity: 0; transition: opacity 0.3s ease;">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
            <span style="font-size: 12px; font-weight: bold; margin-top: 5px;">Upload</span>
          </div>
        </label>
        <input type="file" id="avatar-file-input" accept="image/*" style="display: none;" />
      </div>

      <div class="profile-card">
        <div class="profile-field">
          <div class="profile-field-label">ชื่อ-นามสกุล</div>
          <div class="profile-field-wrap">
            <input class="profile-field-input" id="pf-name" type="text" placeholder="กรอกชื่อ-นามสกุล" />
            <span class="edit-icon">✎</span>
          </div>
        </div>

        <div class="profile-field">
          <div class="profile-field-label">เบอร์โทร</div>
          <div class="profile-field-wrap">
            <input class="profile-field-input" id="pf-phone" type="tel" placeholder="กรอกเบอร์โทรศัพท์" />
            <span class="edit-icon">✎</span>
          </div>
        </div>

        <div class="profile-field">
          <div class="profile-field-label">อีเมล</div>
          <div class="profile-field-wrap">
            <input class="profile-field-input" id="pf-email" type="email" readonly />
          </div>
        </div>

        <div class="history-section">
          <div class="history-title">ประวัติการจอง</div>
          <div class="history-box" id="history-box">
            <div class="history-empty">ยังไม่มีประวัติการจอง</div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="save-btn" id="save-profile-btn">บันทึกข้อมูล</button>
          <button class="logout-btn" id="logout-btn">ออกจากระบบ</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const fileInput = document.getElementById('avatar-file-input');
    const avatarImg = document.getElementById('avatar-img');
    const defaultIcon = document.getElementById('avatar-default-icon');

    fileInput.addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          avatarImg.src = e.target.result;
          avatarImg.style.display = 'block'; // โชว์รูปที่เลือก
          defaultIcon.style.display = 'none'; // ซ่อนไอคอนสีเทา
        }
        reader.readAsDataURL(file);
      }
    });
  </script>

  <script type="module" src="app-firebase.js"></script>
</body>

</html>
