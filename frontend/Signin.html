<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — เข้าสู่ระบบ</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <nav class="navbar" id="navbar">
    <div class="navbar-brand" style="cursor:pointer;" onclick="window.location.href='index.html'">BARBERSHOP</div>
    <div class="navbar-links">
      <button class="nav-link" onclick="window.location.href='index.html#services'">บริการ</button>
      <button class="nav-link" onclick="window.location.href='index.html#experts'">ช่างของเรา</button>
      <button class="nav-link" onclick="window.location.href='booking.html'">จองคิว</button>
      <button class="nav-link" onclick="window.location.href='index.html#footer'">ติดต่อเรา</button>
      <div class="nav-spacer"></div>
      <button class="nav-btn active" onclick="window.location.href='Signin.html'">Sign in</button>
      <button class="nav-btn" onclick="window.location.href='Signup.html'">Signup</button>
      <button class="nav-profile" onclick="window.location.href='profile.html'">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
        </svg>
        Profile
      </button>
    </div>
  </nav>

  <div class="page active" id="page-signin">
    <div class="title">
      <span class="en">Sign In</span>
      <span class="th">ลงชื่อเข้าใช้</span>
    </div>
    <div class="card">

      <div class="field">
        <div class="field-label">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
          </svg>
          Username <span class="req">*</span>
        </div>
        <div class="input-wrap">
          <input id="si-user" type="text" placeholder="อีเมลล์ / เบอร์โทรศัพท์" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <div class="field-label">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z" />
          </svg>
          Password <span class="req">*</span>
        </div>
        <div class="input-wrap">
          <input id="si-pass" class="has-eye" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" />
          <button class="eye-btn" data-target="si-pass" data-icon="si-pass-icon" type="button">
            <svg id="si-pass-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn" id="si-login-btn">เข้าสู่ระบบ</button>
        <button class="btn" id="si-forgot-btn"
          onclick="document.getElementById('page-signin').classList.remove('active'); document.getElementById('page-forgot').classList.add('active');">ลืมรหัสผ่าน</button>
      </div>

      <div class="link-row">
        หากไม่มีบัญชี? <a href="Signup.html">สมัครสมาชิก</a>
      </div>
    </div>
  </div>

  <div class="page" id="page-forgot">
    <div class="title">
      <span class="en">Forgot Password</span>
      <span class="th">ลืมรหัสผ่าน</span>
    </div>
    <div class="card">
      <p style="color:var(--muted);font-size:0.92rem;line-height:1.6;text-align:center;">
        กรอกอีเมลที่ใช้สมัครสมาชิก<br />ระบบจะส่งลิงก์รีเซ็ตรหัสผ่านให้ครับ
      </p>
      <div class="field">
        <div class="field-label">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z" />
          </svg>
          Email <span class="req">*</span>
        </div>
        <div class="input-wrap">
          <input id="fp-email" type="email" placeholder="กรอกอีเมลของคุณ" autocomplete="email" />
        </div>
      </div>
      <button class="btn full" id="fp-send-btn">ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
      <div class="link-row">
        <a
          onclick="document.getElementById('page-forgot').classList.remove('active'); document.getElementById('page-signin').classList.add('active');">←
          กลับไปหน้าเข้าสู่ระบบ</a>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="app-firebase.js"></script>
</body>

</html>
