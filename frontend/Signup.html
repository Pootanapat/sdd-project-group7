<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — สมัครสมาชิก</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="navbar-brand">BARBERSHOP</div>
  <div class="navbar-links">
    <button class="nav-link">บริการ</button>
    <button class="nav-link">ช่างของเรา</button>
    <button class="nav-link">จองคิว</button>
    <button class="nav-link">ติดต่อเรา</button>
    <div class="nav-spacer"></div>
    <button class="nav-btn" onclick="window.location.href='Signin.html'">Sign in</button>
    <button class="nav-btn active" onclick="window.location.href='Signup.html'">Signup</button>
    <button class="nav-profile" onclick="window.location.href='profile.html'">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      Profile
    </button>
  </div>
</nav>

<div class="page active" id="page-signup">
  <div class="title">
    <span class="en">Sign Up</span>
    <span class="th">สมัครสมาชิก</span>
  </div>
  <div class="card">

    <div class="field">
      <div class="field-label">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        Username <span class="req">*</span>
      </div>
      <div class="input-wrap">
        <input id="su-user" type="text" placeholder="Username" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <div class="field-label">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        Email <span class="req">*</span>
      </div>
      <div class="input-wrap">
        <input id="su-email" type="email" placeholder="Email" autocomplete="email"/>
      </div>
    </div>

    <div class="field">
      <div class="field-label">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/></svg>
        Password <span class="req">*</span>
      </div>
      <div class="input-wrap">
        <input id="su-pass" class="has-eye" type="password" placeholder="Password" autocomplete="new-password"/>
        <button class="eye-btn" data-target="su-pass" data-icon="su-pass-icon" type="button">
          <svg id="su-pass-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="hint" id="hint-pass">อย่างน้อย 6 ตัวอักษร</div>
    </div>

    <div class="field">
      <div class="field-label">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/></svg>
        Confirm Password <span class="req">*</span>
      </div>
      <div class="input-wrap">
        <input id="su-confirm" class="has-eye" type="password" placeholder="******" autocomplete="new-password"/>
        <button class="eye-btn" data-target="su-confirm" data-icon="su-confirm-icon" type="button">
          <svg id="su-confirm-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <div class="hint" id="hint-confirm"></div>
    </div>

    <button class="btn full" id="su-submit-btn">สมัครสมาชิก</button>

    <div class="link-row">
      หากมีบัญชี? <a href="Signin.html">ลงชื่อเข้าใช้</a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="app-firebase.js"></script>
</body>
</html>
